<h1>文明OS 統治憲章 v2.1.0</h1>

<p>本書は、文明OSの統治原則を定める公式文書である。</p>

<h2>第一章：文明の原則</h2>
<ul>
<li>構造は機能より優先される</li>
<li>安全性は利便性より優先される</li>
<li>明示は暗黙より優先される</li>
<li>フェイルクローズはサイレントフォールバックより優先される</li>
<li>決定性は性能より優先される</li>
</ul>

<h2>第二章：構造原則</h2>
<ul>
<li>すべての変更はイベントを通じて行われる</li>
<li>層を越えた直接変更は禁止</li>
<li>依存は有向非巡回でなければならない</li>
<li>財務は唯一の真実源を持つ</li>
</ul>

<h2>文明宣言</h2>
<p>
文明OSは決定的であり、再現可能であり、
監査可能であり、暗号的に検証可能である。
</p>
